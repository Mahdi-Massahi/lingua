<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown Styles */
        .markdown-body p { margin-bottom: 0.5em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body strong { font-weight: bold; }
        .markdown-body em { font-style: italic; }
        .markdown-body code { background-color: #f3f4f6; padding: 0.2em 0.4em; rounded: 0.25em; font-family: monospace; }
        .markdown-body pre { background-color: #1f2937; color: #f3f4f6; padding: 1em; rounded: 0.5em; overflow-x: auto; margin-bottom: 0.5em; }
        .markdown-body pre code { background-color: transparent; padding: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
                </svg>
                Lingua
            </h1>
            <div class="space-x-1">
                <button onclick="showSection('dashboard')" id="nav-dashboard" class="px-3 py-2 rounded-md hover:bg-blue-700 font-medium transition-colors bg-blue-700">Dashboard</button>
                <button onclick="showSection('chat')" id="nav-chat" class="px-3 py-2 rounded-md hover:bg-blue-700 font-medium transition-colors">Chat</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <main id="section-dashboard" class="container mx-auto px-4 py-8 flex-1 overflow-y-auto">
        <header class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-600">Track your language learning progress</p>
        </header>

        <!-- User Profile Section -->
        <section id="user-profile" class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4 text-gray-700">User Profile</h2>
            <div id="profile-content" class="text-gray-600">
                Loading profile...
            </div>
        </section>

        <!-- Vocabulary Section -->
        <section id="vocabulary" class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-semibold mb-4 text-gray-700">Vocabulary List</h2>
            <div class="mb-4">
                <input type="text" id="search-input" placeholder="Search vocabulary (semantic search)..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Phrase</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Translation</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Language</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Category</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Added</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Reviewed</th>
                            <th class="px-4 py-2 text-left text-gray-600 font-medium">Stats</th>
                        </tr>
                    </thead>
                    <tbody id="vocabulary-list" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-4 py-2 text-center text-gray-500">Loading vocabulary...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Chat Section -->
    <main id="section-chat" class="flex-1 flex hidden h-[calc(100vh-64px)]">
        <!-- Sidebar -->
        <div class="w-72 bg-gray-50 border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b">
                <button onclick="createNewSession()" class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    New Chat
                </button>
            </div>
            <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Session items will be inserted here -->
                <div class="text-center text-gray-400 text-sm mt-4">Loading sessions...</div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="flex-1 flex flex-col bg-white">
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="flex h-full items-center justify-center text-gray-400 flex-col">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                    <p>Select a session or start a new chat.</p>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50">
                <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="chat-input" class="flex-1 border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">Send</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Global State
        let currentSessionId = null;

        // Navigation
        function showSection(sectionId) {
            document.getElementById('section-dashboard').classList.add('hidden');
            document.getElementById('section-chat').classList.add('hidden');
            
            document.getElementById('nav-dashboard').classList.remove('bg-blue-700');
            document.getElementById('nav-chat').classList.remove('bg-blue-700');

            document.getElementById('section-' + sectionId).classList.remove('hidden');
            document.getElementById('section-' + sectionId).classList.add('flex'); // Add flex for layout
            
            // Fix: Dashboard shouldn't be flex, it's block/default. But Chat is flex.
            if (sectionId === 'dashboard') {
                 document.getElementById('section-dashboard').classList.remove('flex');
            }

            document.getElementById('nav-' + sectionId).classList.add('bg-blue-700');

            if (sectionId === 'chat') {
                loadSessions();
            }
        }

        // --- DASHBOARD LOGIC ---

        async function loadProfile() {
            try {
                const response = await fetch('/api/user');
                const data = await response.json();
                const container = document.getElementById('profile-content');
                
                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p>No profile data available yet.</p>';
                    return;
                }

                let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                for (const [key, value] of Object.entries(data)) {
                    html += `
                        <div class="border-b pb-2">
                            <span class="font-medium text-gray-800 capitalize">${key.replace(/_/g, ' ')}:</span>
                            <span class="ml-2">${value}</span>
                        </div>
                    `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function renderVocabulary(data) {
            const tbody = document.getElementById('vocabulary-list');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-4 text-center text-gray-500">No vocabulary found.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => {
                const meta = item.metadata;
                const distance = item.distance !== undefined ? `<div class="text-xs text-blue-500">Dist: ${item.distance.toFixed(4)}</div>` : '';
                const isStarred = meta.starred === true;
                const starColor = isStarred ? 'text-yellow-500' : 'text-gray-300';
                const escapedText = item.text.replace(/'/g, "\\'");
                const createdDate = meta.created_at ? new Date(meta.created_at).toLocaleDateString() : '-';
                const createdAgo = meta.created_at ? timeAgo(meta.created_at) : '';
                
                const reviewDate = meta.last_review ? new Date(meta.last_review).toLocaleDateString() : '-';
                const reviewAgo = meta.last_review ? timeAgo(meta.last_review) : '';

                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3 font-medium text-gray-800 flex items-center gap-2">
                             <button onclick="playAudio('${escapedText}')" class="text-blue-500 hover:text-blue-700 focus:outline-none p-1 rounded hover:bg-blue-50" title="Play Pronunciation">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                                </svg>
                            </button>
                            <button onclick="toggleStar('${item.id}', this)" class="${starColor} hover:text-yellow-600 focus:outline-none p-1 rounded hover:bg-yellow-50" title="Toggle Favorite">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            ${item.text}
                        </td>
                        <td class="px-4 py-3 text-gray-600">${meta.translation || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${meta.language || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${meta.category || '-'}</td>
                        <td class="px-4 py-3 text-gray-600 text-sm">
                            <div>${createdDate}</div>
                            <div class="text-xs text-gray-400">${createdAgo}</div>
                        </td>
                        <td class="px-4 py-3 text-gray-600 text-sm">
                            <div>${reviewDate}</div>
                            <div class="text-xs text-gray-400">${reviewAgo}</div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-500">
                            <div>Reviews: ${meta.review_count || 0}</div>
                            <div>Score: ${meta.score ? meta.score.toFixed(1) : '0.0'}</div>
                            ${distance}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function timeAgo(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = now - date; // Difference in milliseconds
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return `${diffDays} days ago`;
        }

        async function loadVocabulary() {
            try {
                const response = await fetch('/api/vocabulary');
                const data = await response.json();
                renderVocabulary(data);
            } catch (error) {
                console.error('Error loading vocabulary:', error);
            }
        }

        async function searchVocabulary(query) {
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderVocabulary(data);
            } catch (error) {
                console.error('Error searching vocabulary:', error);
            }
        }

        function playAudio(text) {
            const audio = new Audio(`/api/speak?text=${encodeURIComponent(text)}`);
            audio.play();
        }

        async function toggleStar(id, btn) {
            try {
                const response = await fetch(`/api/vocabulary/${id}/star`, { method: 'POST' });
                const data = await response.json();
                if (data.starred) {
                    btn.classList.remove('text-gray-300');
                    btn.classList.add('text-yellow-500');
                } else {
                    btn.classList.remove('text-yellow-500');
                    btn.classList.add('text-gray-300');
                }
            } catch (error) {
                console.error('Error toggling star:', error);
            }
        }

        // --- CHAT LOGIC ---

        async function loadSessions() {
            const sessionList = document.getElementById('session-list');
            try {
                const response = await fetch('/api/sessions');
                const sessions = await response.json();
                
                if (sessions.length === 0) {
                    sessionList.innerHTML = '<div class="text-center text-gray-400 text-sm mt-4">No sessions yet.</div>';
                    return;
                }

                sessionList.innerHTML = sessions.map(session => `
                    <button onclick="loadSession('${session.id}')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-200 transition-colors text-sm mb-1 ${currentSessionId === session.id ? 'bg-gray-200 font-semibold' : ''}">
                        <div class="truncate text-gray-800">${session.title}</div>
                        <div class="text-xs text-gray-500">${new Date(session.created_at).toLocaleDateString()}</div>
                    </button>
                `).join('');
                
                // If no session selected and sessions exist, load the first one (most recent)
                if (!currentSessionId && sessions.length > 0) {
                   loadSession(sessions[0].id);
                }

            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        function createNewSession() {
            currentSessionId = null; // Will trigger new session on message send
            // Or better: generate UUID here or let backend handle it?
            // Let's clear the chat view and set currentSessionId = null
            // We can generate a random ID for frontend tracking if we want
            currentSessionId = crypto.randomUUID();
            document.getElementById('chat-messages').innerHTML = `
                <div class="flex h-full items-center justify-center text-gray-400 flex-col">
                     <p>Starting new session...</p>
                </div>
            `;
            // Refresh list to remove active state
            loadSessions();
            // Actually, we should probably just empty the messages
             document.getElementById('chat-messages').innerHTML = '';
        }

        async function loadSession(sessionId) {
            currentSessionId = sessionId;
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = '<div class="text-center text-gray-400 mt-10">Loading history...</div>';
            
            // Highlight active session
            loadSessions(); // Re-render list to update active class

            try {
                const response = await fetch(`/api/sessions/${sessionId}`);
                const messages = await response.json();
                
                chatMessages.innerHTML = '';
                if (messages.length === 0) {
                     chatMessages.innerHTML = '<div class="text-center text-gray-400 mt-10">New conversation.</div>';
                } else {
                    messages.forEach(msg => appendMessage(msg.text, msg.role === 'user'));
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        function appendMessage(text, isUser) {
            const chatMessages = document.getElementById('chat-messages');
            
            // Clear "empty" placeholders if any
            if (chatMessages.querySelector('.text-center')) {
               // Only remove if it's the "loading" or "select session" placeholder
               const placeholder = chatMessages.querySelector('.text-center');
               if (placeholder.innerText.includes('Select') || placeholder.innerText.includes('Loading') || placeholder.innerText.includes('New')) {
                   placeholder.remove();
               }
            }

            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            // Parse Markdown for bot messages
            let contentHtml = '';
            if (isUser) {
                contentHtml = text.replace(/\n/g, '<br>');
            } else {
                contentHtml = marked.parse(text);
            }

            div.innerHTML = `
                <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-white text-gray-800 border border-gray-200'} rounded-lg p-4 max-w-[85%] text-sm shadow-sm markdown-body">
                    ${contentHtml}
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Chat Form Submit
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            if (!currentSessionId) {
                createNewSession();
            }

            appendMessage(message, true);
            input.value = '';

            // Loading Indicator
            const chatMessages = document.getElementById('chat-messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'typing-indicator';
            loadingDiv.className = 'flex justify-start';
            loadingDiv.innerHTML = '<div class="bg-gray-100 text-gray-500 rounded-lg p-3 text-sm italic">Thinking...</div>';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: currentSessionId })
                });
                const data = await response.json();
                
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();

                if (data.session_id && data.session_id !== currentSessionId) {
                     // Should not happen if we passed ID, but just in case
                     currentSessionId = data.session_id;
                }

                appendMessage(data.response, false);
                
                // Refresh Sessions List (to update title/time)
                loadSessions();

                // Refresh Dashboard Data in background
                loadVocabulary();
                loadProfile();

            } catch (error) {
                console.error('Chat error:', error);
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                appendMessage('Error communicating with agent.', false);
            }
        });

        // Search Input Logic (Dashboard)
        const searchInput = document.getElementById('search-input');
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = e.target.value.trim();
                if (query) {
                    searchVocabulary(query);
                } else {
                    loadVocabulary();
                }
            }, 300);
        });

        // Init
        loadProfile();
        loadVocabulary();
    </script>
</body>
</html>
