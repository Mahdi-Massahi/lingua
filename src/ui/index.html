<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Markdown Styles for Dark Mode */
        .markdown-body { color: #e5e7eb; }
        .markdown-body p { margin-bottom: 0.5em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body strong { font-weight: bold; color: #fff; }
        .markdown-body em { font-style: italic; }
        .markdown-body code { background-color: #374151; padding: 0.2em 0.4em; rounded: 0.25em; font-family: monospace; color: #e5e7eb; }
        .markdown-body pre { background-color: #111827; border: 1px solid #374151; padding: 1em; rounded: 0.5em; overflow-x: auto; margin-bottom: 0.5em; }
        .markdown-body pre code { background-color: transparent; padding: 0; border: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* Shiny Border Effect Class */
        .shiny-border {
            position: relative;
        }
        .shiny-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            z-index: -1;
            border-radius: inherit;
            background: linear-gradient(45deg, rgba(139, 92, 246, 0.3), rgba(79, 70, 229, 0.1), rgba(139, 92, 246, 0.3));
            filter: blur(1px);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col font-sans antialiased selection:bg-violet-500/30 overflow-hidden">
    <!-- Navbar -->
    <nav class="bg-gray-900/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-purple-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
                </svg>
                Lingua
            </h1>
            <div class="space-x-1 bg-gray-800/50 p-1 rounded-lg border border-white/5">
                <button onclick="showSection('dashboard')" id="nav-dashboard" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200 hover:text-white text-gray-400 data-[active=true]:bg-violet-600 data-[active=true]:text-white data-[active=true]:shadow-lg data-[active=true]:shadow-violet-500/20">Dashboard</button>
                <button onclick="showSection('chat')" id="nav-chat" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200 hover:text-white text-gray-400 data-[active=true]:bg-violet-600 data-[active=true]:text-white data-[active=true]:shadow-lg data-[active=true]:shadow-violet-500/20">Chat</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <main id="section-dashboard" class="container mx-auto px-4 py-8 flex-1 overflow-y-auto">
        <header class="mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400">Track your language learning progress</p>
        </header>

        <!-- User Profile Section -->
        <section id="user-profile" class="bg-gray-900 border border-white/5 rounded-2xl p-6 mb-8 shiny-border shadow-xl">
            <h2 class="text-xl font-semibold mb-4 text-violet-300">User Profile</h2>
            <div id="profile-content" class="text-gray-300">
                Loading profile...
            </div>
        </section>

        <!-- Vocabulary Section -->
        <section id="vocabulary" class="bg-gray-900 border border-white/5 rounded-2xl p-6 shiny-border shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-violet-300">Vocabulary List</h2>
                <div class="relative w-64">
                    <input type="text" id="search-input" placeholder="Search vocabulary..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 pl-10 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all text-sm text-white placeholder-gray-500">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            
            <div class="overflow-x-auto rounded-lg border border-white/5">
                <table class="min-w-full table-auto text-left">
                    <thead class="bg-gray-800/50 text-gray-400 text-xs uppercase tracking-wider font-semibold">
                        <tr>
                            <th class="px-6 py-4">Phrase</th>
                            <th class="px-6 py-4">Translation</th>
                            <th class="px-6 py-4">Language</th>
                            <th class="px-6 py-4">Category</th>
                            <th class="px-6 py-4">Added</th>
                            <th class="px-6 py-4">Reviewed</th>
                            <th class="px-6 py-4">Stats</th>
                        </tr>
                    </thead>
                    <tbody id="vocabulary-list" class="divide-y divide-white/5 text-sm">
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">Loading vocabulary...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Chat Section -->
    <main id="section-chat" class="flex-1 flex hidden min-h-0">
        <!-- Sidebar -->
        <div class="w-80 bg-gray-900 border-r border-white/5 flex flex-col min-h-0">
            <div class="p-4 border-b border-white/5">
                <button onclick="createNewSession()" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white px-4 py-3 rounded-xl hover:from-violet-500 hover:to-indigo-500 transition-all shadow-lg shadow-violet-500/20 font-medium flex items-center justify-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:scale-110 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    New Chat
                </button>
            </div>
            <div id="session-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                <!-- Session items -->
                <div class="text-center text-gray-500 text-sm mt-8">Loading sessions...</div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="flex-1 flex flex-col bg-gray-950 relative min-h-0">
            <!-- Background Glow -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute -top-[20%] -right-[10%] w-[500px] h-[500px] rounded-full bg-violet-900/10 blur-3xl"></div>
                <div class="absolute top-[20%] -left-[10%] w-[400px] h-[400px] rounded-full bg-indigo-900/10 blur-3xl"></div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 z-10">
                <div class="flex h-full items-center justify-center text-gray-500 flex-col">
                    <div class="p-6 rounded-full bg-gray-900/50 border border-white/5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-violet-500/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                    </div>
                    <p class="font-medium">Select a session or start a new chat</p>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 bg-gray-900/50 backdrop-blur z-10">
                <form id="chat-form" class="flex gap-3 max-w-4xl mx-auto">
                    <input type="text" id="chat-input" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-5 py-3.5 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-sm text-white placeholder-gray-500" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="bg-violet-600 text-white px-6 py-2 rounded-xl hover:bg-violet-500 transition-colors font-medium shadow-lg shadow-violet-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Global State
        let currentSessionId = null;

        // Navigation
        function showSection(sectionId) {
            document.getElementById('section-dashboard').classList.add('hidden');
            document.getElementById('section-chat').classList.add('hidden');
            
            const navDash = document.getElementById('nav-dashboard');
            const navChat = document.getElementById('nav-chat');
            
            navDash.removeAttribute('data-active');
            navChat.removeAttribute('data-active');

            document.getElementById('section-' + sectionId).classList.remove('hidden');
            document.getElementById('section-' + sectionId).classList.add('flex');
            
            if (sectionId === 'dashboard') {
                 document.getElementById('section-dashboard').classList.remove('flex');
            }

            document.getElementById('nav-' + sectionId).setAttribute('data-active', 'true');

            if (sectionId === 'chat') {
                loadSessions();
            }
        }

        // Init Navigation State
        document.getElementById('nav-dashboard').setAttribute('data-active', 'true');

        // --- DASHBOARD LOGIC ---

        async function loadProfile() {
            try {
                const response = await fetch('/api/user');
                const data = await response.json();
                const container = document.getElementById('profile-content');
                
                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p class="text-gray-500">No profile data available yet.</p>';
                    return;
                }

                let html = '<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2">';

                // Streak Cards
                const currentStreak = data.current_streak || 0;
                const maxStreak = data.max_streak || 0;

                html += `
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-white/5 shiny-border relative overflow-hidden group">
                        <div class="absolute -right-4 -top-4 bg-violet-500/10 w-24 h-24 rounded-full blur-2xl group-hover:bg-violet-500/20 transition-colors"></div>
                        <span class="block text-[9px] font-bold text-gray-500 uppercase tracking-wider mb-0.5 relative z-10">Streak</span>
                        <span class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500 relative z-10">🔥 ${currentStreak}</span>
                    </div>
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-white/5 relative overflow-hidden group">
                        <div class="absolute -right-4 -top-4 bg-blue-500/10 w-24 h-24 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-colors"></div>
                        <span class="block text-[9px] font-bold text-gray-500 uppercase tracking-wider mb-0.5 relative z-10">Max</span>
                        <span class="text-lg text-gray-100 relative z-10 font-bold">⚡ ${maxStreak}</span>
                    </div>
                `;

                for (const [key, value] of Object.entries(data)) {
                    if (key === 'current_streak' || key === 'max_streak' || key === 'last_active_date') continue;

                    let displayValue = value;
                    let dateHtml = '';

                    if (typeof value === 'object' && value !== null && value.value !== undefined) {
                        displayValue = value.value;
                        if (value.updated_at) {
                            const date = new Date(value.updated_at).toLocaleDateString(undefined, { month: 'numeric', day: 'numeric' });
                            dateHtml = `<span class="text-[9px] text-gray-600 ml-auto">${date}</span>`;
                        }
                    }

                    html += `
                        <div class="bg-gray-800/50 p-2 rounded-lg border border-white/5 hover:border-white/10 transition-colors flex flex-col justify-between h-full">
                            <div class="flex justify-between items-start mb-0.5">
                                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-wider truncate mr-1" title="${key}">${key.replace(/_/g, ' ')}</span>
                                ${dateHtml}
                            </div>
                            <span class="text-xs text-gray-200 break-words font-medium leading-tight">${displayValue}</span>
                        </div>
                    `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function renderVocabulary(data) {
            const tbody = document.getElementById('vocabulary-list');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500 italic">No vocabulary found yet. Start chatting to learn!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => {
                const meta = item.metadata;
                const distance = item.distance !== undefined ? `<div class="text-xs text-violet-400 mt-1">Dist: ${item.distance.toFixed(4)}</div>` : '';
                const isStarred = meta.starred === true;
                const starColor = isStarred ? 'text-yellow-400' : 'text-gray-600 group-hover:text-gray-400';
                const escapedText = item.text.replace(/'/g, "\\'");
                const createdDate = meta.created_at ? new Date(meta.created_at).toLocaleDateString() : '-';
                const createdAgo = meta.created_at ? timeAgo(meta.created_at) : '';
                
                const reviewDate = meta.last_review ? new Date(meta.last_review).toLocaleDateString() : '-';
                const reviewAgo = meta.last_review ? timeAgo(meta.last_review) : '';
                
                const references = meta.references || [];
                const lastRef = references.length > 0 ? references[references.length - 1] : null;
                const hasContext = lastRef && lastRef.session_id;
                
                const chatLink = `<button onclick="${hasContext ? `jumpToSession('${lastRef.session_id}', '${escapedText}')` : ''}" 
                    class="${hasContext ? 'text-violet-400 hover:text-violet-300 hover:bg-violet-500/20' : 'text-gray-700 cursor-not-allowed'} p-1.5 rounded-lg transition-colors ml-1" 
                    title="${hasContext ? 'Jump to Chat' : 'No chat context available'}" 
                    ${!hasContext ? 'disabled' : ''}>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
                    </svg>
                </button>`;

                return `
                    <tr class="hover:bg-white/5 transition-colors group border-b border-white/5 last:border-0">
                        <td class="px-6 py-4 font-medium text-gray-100">
                            <div class="flex items-center gap-3">
                                <button onclick="playAudio('${escapedText}')" class="text-violet-400 hover:text-white hover:bg-violet-600 p-1.5 rounded-full transition-all" title="Play Pronunciation">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                                <button onclick="toggleStar('${item.id}', this)" class="${starColor} p-1.5 rounded-lg hover:bg-white/10 transition-colors" title="Toggle Favorite">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                    </svg>
                                </button>
                                ${chatLink}
                                <span class="text-base">${item.text}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-300">${meta.translation || '-'}</td>
                        <td class="px-6 py-4 text-gray-400">${meta.language || '-'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded bg-gray-800 border border-gray-700 text-xs text-gray-300">${meta.category || 'General'}</span>
                        </td>
                        <td class="px-6 py-4 text-gray-400 text-sm">
                            <div>${createdDate}</div>
                            <div class="text-xs text-gray-600">${createdAgo}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-400 text-sm">
                            <div>${reviewDate}</div>
                            <div class="text-xs text-gray-600">${reviewAgo}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">
                            <div>Reviews: <span class="text-gray-300">${meta.review_count || 0}</span></div>
                            ${distance}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function timeAgo(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = now - date; 
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return `${diffDays} days ago`;
        }

        async function loadVocabulary() {
            try {
                const response = await fetch('/api/vocabulary');
                const data = await response.json();
                renderVocabulary(data);
            } catch (error) {
                console.error('Error loading vocabulary:', error);
            }
        }

        async function searchVocabulary(query) {
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderVocabulary(data);
            } catch (error) {
                console.error('Error searching vocabulary:', error);
            }
        }

        function jumpToSession(sessionId, highlightText) {
            showSection('chat');
            loadSession(sessionId, highlightText);
        }

        function playAudio(text) {
            const audio = new Audio(`/api/speak?text=${encodeURIComponent(text)}`);
            audio.play();
        }

        async function toggleStar(id, btn) {
            try {
                const response = await fetch(`/api/vocabulary/${id}/star`, { method: 'POST' });
                const data = await response.json();
                // Update color based on new state
                const svg = btn.querySelector('svg');
                if (data.starred) {
                    btn.classList.remove('text-gray-600', 'group-hover:text-gray-400');
                    btn.classList.add('text-yellow-400');
                } else {
                    btn.classList.remove('text-yellow-400');
                    btn.classList.add('text-gray-600', 'group-hover:text-gray-400');
                }
            } catch (error) {
                console.error('Error toggling star:', error);
            }
        }

        // --- CHAT LOGIC ---

        async function loadSessions() {
            const sessionList = document.getElementById('session-list');
            try {
                const response = await fetch('/api/sessions');
                const sessions = await response.json();
                
                if (sessions.length === 0) {
                    sessionList.innerHTML = '<div class="text-center text-gray-500 text-sm mt-8">No sessions history.</div>';
                    return;
                }

                sessionList.innerHTML = sessions.map(session => `
                    <button onclick="loadSession('${session.id}')" class="w-full text-left px-4 py-3 rounded-xl transition-all mb-2 flex flex-col gap-1 border border-transparent hover:bg-gray-800 hover:border-white/5 ${currentSessionId === session.id ? 'bg-gray-800 border-violet-500/30 shadow-md' : ''}">
                        <div class="truncate text-gray-200 font-medium ${currentSessionId === session.id ? 'text-violet-300' : ''}">${session.title}</div>
                        <div class="text-xs text-gray-500">${new Date(session.created_at).toLocaleDateString()}</div>
                    </button>
                `).join('');
                
                if (!currentSessionId && sessions.length > 0) {
                   loadSession(sessions[0].id);
                }

            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        function createNewSession() {
            currentSessionId = null; 
            currentSessionId = crypto.randomUUID();
            document.getElementById('chat-messages').innerHTML = `
                <div class="flex h-full items-center justify-center text-gray-500 flex-col">
                    <div class="p-6 rounded-full bg-gray-900/50 border border-white/5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-violet-500/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                    </div>
                    <p class="font-medium">New Conversation Started</p>
                </div>
            `;
            loadSessions();
        }

        async function loadSession(sessionId, highlightText = null) {
            currentSessionId = sessionId;
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = '<div class="flex h-full items-center justify-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-500"></div></div>';
            
            loadSessions(); 

            try {
                const response = await fetch(`/api/sessions/${sessionId}`);
                const messages = await response.json();
                
                chatMessages.innerHTML = '';
                if (messages.length === 0) {
                     chatMessages.innerHTML = '<div class="flex h-full items-center justify-center text-gray-500">No messages yet.</div>';
                } else {
                    messages.forEach(msg => appendMessage(msg.text, msg.role === 'user', msg.tool_calls));
                }

                if (highlightText) {
                    setTimeout(() => {
                        const container = document.getElementById('chat-messages');
                        const bubbles = container.querySelectorAll('.markdown-body');
                        for (let i = bubbles.length - 1; i >= 0; i--) {
                            const bubble = bubbles[i];
                            if (bubble.innerText.includes(highlightText)) {
                                bubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                bubble.classList.add('ring-2', 'ring-yellow-400', 'shadow-[0_0_20px_rgba(250,204,21,0.3)]');
                                setTimeout(() => bubble.classList.remove('ring-2', 'ring-yellow-400', 'shadow-[0_0_20px_rgba(250,204,21,0.3)]'), 3000);
                                break;
                            }
                        }
                    }, 100);
                }

            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        function appendMessage(text, isUser, toolCalls) {
            const chatMessages = document.getElementById('chat-messages');
            
            if (chatMessages.querySelector('.flex.h-full')) {
               const placeholder = chatMessages.querySelector('.flex.h-full');
               placeholder.remove();
            }

            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            let contentHtml = '';
            let toolsHtml = '';

            if (toolCalls && toolCalls.length > 0) {
                toolsHtml = `
                    <details class="mt-3 pt-3 border-t border-white/10 group">
                        <summary class="cursor-pointer text-xs font-medium text-gray-500 hover:text-violet-300 flex items-center gap-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                            </svg>
                            Used ${toolCalls.length} tool(s)
                        </summary>
                        <div class="mt-2 pl-3 border-l-2 border-gray-700 space-y-3">
                            ${toolCalls.map(tc => `
                                <div>
                                    <div class="font-mono text-[10px] uppercase tracking-wide text-violet-400 mb-1">${tc.name}</div>
                                    <pre class="font-mono text-[10px] bg-gray-900/50 p-2 rounded-lg border border-white/5 overflow-x-auto text-gray-400">${JSON.stringify(tc.args, null, 2)}</pre>
                                </div>
                            `).join('')}
                        </div>
                    </details>
                `;
            }

            if (isUser) {
                contentHtml = text.replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="bg-gradient-to-br from-violet-600 to-indigo-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[85%] text-sm shadow-lg shadow-violet-900/20 markdown-body">
                        ${contentHtml}
                    </div>
                `;
            } else {
                contentHtml = marked.parse(text);
                div.innerHTML = `
                    <div class="bg-gray-800 text-gray-200 border border-white/5 rounded-2xl rounded-tl-none p-5 max-w-[85%] text-sm shadow-xl markdown-body">
                        ${contentHtml}
                        ${toolsHtml}
                    </div>
                `;
                
                const messageBody = div.querySelector('.markdown-body');
                const strongs = messageBody.querySelectorAll('strong');
                strongs.forEach(strong => {
                    const word = strong.innerText;
                    
                    const btn = document.createElement('button');
                    btn.className = 'inline-flex items-center justify-center ml-1.5 text-violet-400 hover:text-white bg-violet-500/10 hover:bg-violet-500 rounded p-0.5 transition-colors align-middle';
                    btn.title = 'Play Pronunciation';
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
                    
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        playAudio(word);
                    };
                    
                    strong.appendChild(btn);
                });
            }

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Chat Form Submit
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            if (!currentSessionId) {
                createNewSession();
            }

            appendMessage(message, true);
            input.value = '';

            // Loading Indicator
            const chatMessages = document.getElementById('chat-messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'typing-indicator';
            loadingDiv.className = 'flex justify-start animate-pulse';
            loadingDiv.innerHTML = `
                <div class="bg-gray-800 text-gray-400 rounded-2xl rounded-tl-none p-4 text-sm border border-white/5 flex gap-1">
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                </div>`;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: currentSessionId })
                });
                const data = await response.json();
                
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();

                if (data.session_id && data.session_id !== currentSessionId) {
                     currentSessionId = data.session_id;
                }

                appendMessage(data.response, false, data.tool_calls);
                loadSessions();
                loadVocabulary();
                loadProfile();

            } catch (error) {
                console.error('Chat error:', error);
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                appendMessage('Error communicating with agent.', false);
            }
        });

        const searchInput = document.getElementById('search-input');
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = e.target.value.trim();
                if (query) {
                    searchVocabulary(query);
                } else {
                    loadVocabulary();
                }
            }, 300);
        });

        loadProfile();
        loadVocabulary();
    </script>
</body>
</html>
